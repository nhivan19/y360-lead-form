<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký cập nhật kiến thức Dược sĩ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            max-width: 500px;
            font-family: 'Inter', sans-serif;
            margin: 20px auto;
            padding: 15px;
            background: #f8f9fa;
            color: #333;
        }
        .form-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 { color: #007bff; text-align: center; margin-bottom: 10px; }
        p.intro { font-size: 14px; line-height: 1.6; margin-bottom: 20px; text-align: center; color: #666; }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border 0.3s;
        }
        input:focus { border-color: #007bff; outline: none; }

        button {
            width: 100%;
            padding: 14px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.3s;
        }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        #msg {
            display: none;
            text-align: center;
            padding: 20px;
            background: #d4edda;
            color: #155724;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <form id="my-custom-form">
        <h2>Đăng Ký Thành Viên</h2>
        <p class="intro">Vui lòng điền thông tin để nhận tài liệu chuyên môn và hỗ trợ tạo tài khoản.</p>

        <input type="text" name="name" placeholder="Họ và tên" required>
        <input type="tel" name="phone" placeholder="Số điện thoại (10 số)" pattern="[0-9]{10}" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="pharmacy_name" placeholder="Tên nhà thuốc" required>
        <input type="text" name="province" placeholder="Tỉnh thành" required>
        
        <input type="hidden" name="utm_source" id="utm_source">
        <input type="hidden" name="utm_medium" id="utm_medium">
        <input type="hidden" name="utm_campaign" id="utm_campaign">

        <button type="submit" id="submitBtn">GỬI ĐĂNG KÝ</button>
    </form>

    <div id="msg">
        🎉 <strong>Đăng ký thành công!</strong><br>
        Cảm ơn bạn, chúng tôi sẽ liên hệ qua Zalo/Email sớm nhất.
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzzDU2WRWRYbOrLi4mbivxGRmYuPvVhI7zKcHelFE4mFBP2yfNOIqc2k0BmwhRO3z6z8Q/exec';
    const form = document.getElementById('my-custom-form');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('msg');

    // Hàm lấy UTM từ link website
    function getParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name) || '';
    }

    // Tự động điền UTM vào form khi trang load
    document.getElementById('utm_source').value = getParam('utm_source');
    document.getElementById('utm_medium').value = getParam('utm_medium');
    document.getElementById('utm_campaign').value = getParam('utm_campaign');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'Đang xử lý...';

        // Gửi dữ liệu tới Google Sheets
        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: new FormData(form) 
        })
        .then(() => {
            form.reset();
            form.style.display = 'none';
            msg.style.display = 'block';
        })
        .catch(error => {
            console.error('Lỗi!', error.message);
            btn.disabled = false;
            btn.innerText = 'THỬ LẠI';
            alert('Có lỗi xảy ra. Vui lòng kiểm tra kết nối mạng!');
        });
    });
</script>

</body>
</html>
